<head>

    <title>输入密码</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.js"></script>
</head>
<body>
    <h2>页面受保护，请输入密码：</h2>
    <input type="password" id="p" placeholder="请输入密码">
    <button onclick="a()">提交</button>
    <script>
        var b="3fbfa6c73d84ab12f63cd2e3b234682881c8f56a",c=function(){return["/","e","h","6","N","w","g","1","S","/"]},a=function(){var d=document.getElementById("p").value,e=CryptoJS.SHA256(d).toString(CryptoJS.enc.Hex);if(e===b)window.location.href=c().join("");else alert("密码错误，请重试！")};
    </script>
</body>
</html>
